<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D42B2B"/>
      <stop offset="100%" style="stop-color:#8B1519"/>
    </linearGradient>
    <filter id="shadowA" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0.8" stdDeviation="0.8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- 超橢圓背景 -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bgA)"/>
  <!-- 頂部微光澤 -->
  <rect width="32" height="16" rx="7" ry="7" fill="url(#bgA)" opacity="0"/>
  <rect width="30" height="14" x="1" y="1" rx="6" ry="6" fill="white" opacity="0.08"/>
  <!-- V 字母（粗體，帶陰影） -->
  <text x="16" y="23.5" font-family="Arial, Helvetica, sans-serif" font-weight="900"
        font-size="22" fill="white" text-anchor="middle" filter="url(#shadowA)">V</text>
  <!-- 右下角金色圓點裝飾 -->
  <circle cx="25" cy="25.5" r="2.8" fill="#C4A46D" opacity="0.9"/>
  <circle cx="24.5" cy="25" r="1.2" fill="white" opacity="0.2"/>
</svg>